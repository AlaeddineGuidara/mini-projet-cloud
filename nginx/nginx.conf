events {}

http {
    # "upstream" = groupe de serveurs Flask
    # Nginx répartit automatiquement la charge entre eux (round-robin)
    upstream flask_app {
        server app:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
