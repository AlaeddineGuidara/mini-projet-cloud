events {
    worker_connections 1024;
}

http {
    upstream flask_app {
        server app:5000;
        keepalive 0;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://flask_app;
            proxy_http_version 1.0;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
