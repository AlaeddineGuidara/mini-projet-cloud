services:

  # --- Base de données PostgreSQL ---
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data   # persistance des données
    networks:
      - backend

  # --- Cache Redis ---
  redis:
    image: redis:7-alpine
    networks:
      - backend

  # --- Application Flask ---
  app:
    build: ./app
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - backend
      - frontend
    restart: on-failure

  # --- Reverse proxy Nginx ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"         # port visible depuis ton navigateur
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - frontend

  # --- Monitoring : métriques conteneurs ---
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend

  # --- Prometheus : collecte des métriques ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  # --- Grafana : visualisation ---
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"     # interface Grafana dans le navigateur
    networks:
      - backend

# --- Réseaux isolés ---
networks:
  frontend:   # nginx <-> app
  backend:    # app <-> db, redis, monitoring

# --- Volume persistant pour PostgreSQL ---
volumes:
  db-data:
